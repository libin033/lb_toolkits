name: rtd38
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip>=20.1
  - gdal>=3.2
  - numpy >=1.2.0
  - h5py >=1.0.0
  - netcdf4 >=1.0.0
  - tqdm >=4.0.0
  - cdsapi >=0.5.0
  - pyshp >=2.1.0
  - pillow >=6.0.0
  - imageio >=2.15.0
  - paramiko >=2.10.0
prefix: /home/docs/.conda/envs/rtd38